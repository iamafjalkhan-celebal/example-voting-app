# CI Workflow Template — Python Project
# Generated by: devops-pipeline-architect + dependency-manager + code-quality-gate + security-scanner

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Quality Gate (fast, runs first) ──────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install quality tools
        run: pip install ruff mypy

      - name: Lint
        run: ruff check . --output-format=github

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy . --ignore-missing-imports

  # ── Tests with Coverage ──────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-cov pytest-xdist

      - name: Run tests
        run: |
          pytest \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term \
            --cov-fail-under=60 \
            --junitxml=reports/junit.xml \
            -n auto

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            reports/
            coverage.xml
          retention-days: 7

  # ── Security Scan ────────────────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  # ── Build ────────────────────────────────────────────────
  build:
    name: Build Package
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
