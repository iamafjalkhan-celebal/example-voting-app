# CI Workflow Template — Docker Build & Scan (No Push)
# Generated by: devops-pipeline-architect + docker-builder + security-scanner

name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Set up BuildKit for advanced caching
      - uses: docker/setup-buildx-action@v3

      # Build with GitHub Actions cache (no push)
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            app:${{ github.sha }}
            app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Scan for vulnerabilities
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: app:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Image size report
      - name: Image size report
        if: success()
        run: |
          echo "## Docker Image Report 🐳" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          SIZE=$(docker image inspect app:${{ github.sha }} --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Size | $SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | app:${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
