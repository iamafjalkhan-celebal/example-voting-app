name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel PR runs, not main branch runs
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if ! echo "$TITLE" | grep -qE '^(feat|fix|docs|chore|refactor|test|ci|perf|style|build)(\(.+\))?: .+'; then
            echo "::error::PR title must follow Conventional Commits format"
            echo "Expected: type(scope): description"
            echo "Got: $TITLE"
            exit 1
          fi

  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      vote: ${{ steps.filter.outputs.vote }}
      result: ${{ steps.filter.outputs.result }}
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vote:
              - 'vote/**'
              - '.github/workflows/ci.yml'
            worker:
              - 'worker/**'
              - '.github/workflows/ci.yml'
            result:
              - 'result/**'
              - '.github/workflows/ci.yml'

  lint-vote:
    name: Lint Vote (Python)
    needs: changes
    if: needs.changes.outputs.vote == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter (Check Mode)
        continue-on-error: true
        run: ruff check ./vote --output-format=github

  lint-result:
    name: Lint Result (Node.js)
    needs: changes
    if: needs.changes.outputs.result == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Prettier (Check Mode)
        continue-on-error: true
        run: npx prettier --check ./result

  build:
    name: Build ${{ matrix.service }}
    needs: changes
    # Only run the matrix if the changes array isn't empty '[]'
    if: ${{ needs.changes.outputs.matrix != '[]' && needs.changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: example-voting-app-${{ matrix.service }}:${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  ci-ok:
    name: CI OK
    needs: [build, pr-title, lint-vote, lint-result]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more build jobs failed"
            exit 1
          fi
          echo "All checks passed ✅"
