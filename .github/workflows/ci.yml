name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Only cancel PR runs, not main branch runs
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vote:
              - 'vote/**'
              - '.github/workflows/ci.yml'
            worker:
              - 'worker/**'
              - '.github/workflows/ci.yml'
            result:
              - 'result/**'
              - '.github/workflows/ci.yml'

  build:
    name: Build ${{ matrix.service }}
    needs: changes
    # Only run the matrix if the changes array isn't empty '[]'
    if: ${{ needs.changes.outputs.matrix != '[]' && needs.changes.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: example-voting-app-${{ matrix.service }}:${{ github.sha }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=gha
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  ci-ok:
    name: CI OK
    needs: build
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more build jobs failed"
            exit 1
          fi
          echo "All checks passed ✅"
